<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Tests service-test-ui</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; }
    .pass { color: #147d4d; }
    .fail { color: #b42318; }
  </style>
</head>
<body>
  <h1>Tests service-test-ui</h1>
  <pre id="output"></pre>
  <script src="./service-test-ui.js"></script>
  <script>
    const output = document.getElementById("output");
    const logs = [];

    function assert(name, condition) {
      if (!condition) throw new Error(name);
      logs.push(`PASS ${name}`);
    }

    function run() {
      const api = window.AstralServiceTestUi;
      const input = {
        birthDate: "1990-06-15",
        birthTime: "14:30:00",
        timezone: "Europe/Paris",
        targetDate: "2026-06-09",
        language: "fr",
        audience: "general",
        autoLocation: false,
        location: {
          latitude: 48.8566,
          longitude: 2.3522,
          label: "Paris, France",
          countryCode: "fr",
        },
      };

      const natal = api.buildGatewayNatalRequest(input);
      assert("payload natal context", natal.context.target_language_code === "fr");
      assert("payload natal birth location", natal.birth.location.latitude === 48.8566);
      assert("payload natal audience general", natal.context.audience_level === "general");

      const calculatorNatal = api.buildCalculatorNatalPayload(input);
      assert("payload calculator natal contract", calculatorNatal.request_contract_version === "astro_engine_request_v1");
      assert("payload calculator natal projection", calculatorNatal.projection.level === "compact");
      assert("payload calculator natal heure", calculatorNatal.birth.time === "14:30:00");

      const daily = api.buildGatewayHoroscopeDailyRequest(input, 123, { tier: "premium" });
      assert("payload horoscope daily id", daily.chart_calculation_id === "123");
      assert("payload horoscope daily date", daily.date === "2026-06-09");
      assert("payload horoscope daily premium location", daily.location.label === "Paris, France");
      assert("payload horoscope daily premium detail", daily.detail_level === "premium_rich");

      const freeDaily = api.buildGatewayHoroscopeDailyRequest(input, 123, { tier: "free" });
      assert("payload horoscope daily free no location", !Object.prototype.hasOwnProperty.call(freeDaily, "location"));

      const period = api.buildGatewayHoroscopePeriodRequest(input, 456);
      assert("payload horoscope period anchor", period.anchor_date === "2026-06-09");
      assert("payload horoscope period langue", period.target_language === "fr");
      assert("payload horoscope period code", period.target_language_code === "fr");
      assert("payload horoscope period audience", period.audience_level === "general");

      assert("code langue supporte", api.supportedTargetLanguageCode("de") === "de");
      assert("code langue non supporte", api.supportedTargetLanguageCode("it") === null);
      assert("audience gateway beginner", api.normalizeGatewayAudience("beginner") === "beginner");
      assert("audience horoscope expert", api.normalizeHoroscopeAudience("expert") === "expert");
      assert("detection horoscope", api.isHoroscopeService({ kind: "horoscope_period" }));

      const grouped = api.buildServiceGroups(api.PUBLIC_SERVICES);
      const natalFrame = grouped.find((item) => item.key === "natal");
      const horoscopeFrame = grouped.find((item) => item.key === "horoscope");
      assert("frame natal present", Boolean(natalFrame));
      assert("frame horoscope present", Boolean(horoscopeFrame));
      assert("natal order free basic premium", natalFrame.subframes[0].services.map((item) => item.tier).slice(0, 3).join(",") === "free,basic,premium");
      assert("horoscope daily subframe present", horoscopeFrame.subframes.some((item) => item.key === "daily"));
      assert("horoscope period subframe present", horoscopeFrame.subframes.some((item) => item.key === "period"));

      const blockedNoLocation = api.serviceCanRun({ kind: "natal_simplified" }, { ...input, location: null });
      assert("validation service bloque sans location", blockedNoLocation === "Resoudre le lieu avant execution.");
      const blockedAutoLocation = api.serviceCanRun({ kind: "natal_simplified" }, { ...input, location: null, autoLocation: true });
      assert("validation service bloque auto location", blockedAutoLocation === "Localisation automatique en attente ou echouee.");

      const natalSections = api.normalizeGatewayReadingSections({
        metadata: { product_code: "natal_full_basic", variant: "full", tier: "basic" },
        quality: { calculator_contract_version: "astro_engine_response_v1", llm_contract_version: "generate_reading_response_v1" },
        reading: {
          reading: {
            summary: { title: "Synthese", short_text: "Texte court." },
            chapters: [{ title: "Chapitre", body: "Paragraphe 1.\n\nParagraphe 2." }],
          }
        }
      });
      assert("rendu gateway natal sections", natalSections.length >= 4);

      const copyText = api.composeCopiedReading("Natal full Basic", "Bloc 1\nBloc 2");
      assert("copie contient service", copyText.includes("Service: Natal full Basic"));
      assert("copie contient date", copyText.includes("Date: "));
      assert("copie contient texte", copyText.includes("Bloc 1"));

      const joined = api.joinSectionsForCopy([
        { title: "Resume", paragraphs: ["Paragraphe A"] },
        { title: "Chapitre", meta: ["Meta"], paragraphs: ["Paragraphe B"] },
      ]);
      assert("join sections include meta", joined.includes("Meta"));
      assert("join sections include title", joined.includes("Resume"));

      const usage = api.summarizeUsage({
        audit: {
          token_input: 120,
          token_output: 450,
          steps: [
            { step_type: "writer", status: "completed", provider: "openai", model: "gpt-5", input_tokens: 120, output_tokens: 450, latency_ms: 1900 }
          ]
        }
      });
      assert("usage input", usage.inputTokens === 120);
      assert("usage output", usage.outputTokens === 450);
      assert("usage cost placeholder", usage.costLabel === "indisponible");
      assert("usage steps detail", usage.steps.length === 1);

      const runId = api.extractRunId({ metadata: { run_id: "123e4567-e89b-12d3-a456-426614174000" } });
      assert("extract run id", runId === "123e4567-e89b-12d3-a456-426614174000");

      const promptTracePayload = api.extractPromptPayload({}, {
        status: "success",
        prompt_traces: [{
          chapter_code: "identity",
          step_type: "chapter_generate",
          attempt: "primary",
          prompt_family: "natal_prompter",
          prompt_version: "v1",
          message_count: 2,
          compiled_prompt: "SYSTEM\\nUSER",
          messages_json: [{ role: "system", content: "SYSTEM" }, { role: "user", content: "USER" }],
          created_at: "2026-06-15T08:00:00Z",
        }]
      });
      assert("prompt traces prioritized", promptTracePayload.kind === "prompt_traces");
      assert("prompt traces count single", promptTracePayload.traces.length === 1);
      assert("prompt traces chapter preserved", promptTracePayload.traces[0].chapterCode === "identity");

      const promptTraceFallbackPriority = api.extractPromptPayload({ prompt: "legacy" }, {
        prompt_traces: [{
          step_type: "summary_generate",
          compiled_prompt: "AUDIT FIRST",
          messages_json: [],
          message_count: 0,
          created_at: "2026-06-15T08:01:00Z",
        }]
      });
      assert("prompt traces beat legacy fallback", promptTraceFallbackPriority.traces[0].compiledPrompt === "AUDIT FIRST");

      const multiPromptPayload = api.extractPromptPayload({}, {
        prompt_traces: [
          {
            step_type: "chapter_generate",
            attempt: "primary",
            compiled_prompt: "P1",
            messages_json: [{ role: "system", content: "P1" }],
            message_count: 1,
            created_at: "2026-06-15T08:02:00Z",
          },
          {
            step_type: "summary_generate",
            attempt: "repair",
            compiled_prompt: "P2",
            messages_json: [{ role: "system", content: "P2" }],
            message_count: 1,
            created_at: "2026-06-15T08:03:00Z",
          }
        ]
      });
      assert("multi prompt traces preserved", multiPromptPayload.traces.length === 2);
      assert("multi prompt traces keep order", multiPromptPayload.traces[1].attempt === "repair");

      const legacyPromptPayload = api.extractPromptPayload({ prompt: "legacy prompt text" }, null);
      assert("legacy prompt fallback kind", legacyPromptPayload.kind === "legacy_prompt");
      assert("legacy prompt fallback content", legacyPromptPayload.traces[0].compiledPrompt === "legacy prompt text");

      const legacyStructuredPayload = api.extractPromptPayload({
        prompt_trace: {
          step_type: "legacy_step",
          attempt: "primary",
          compiled_prompt: "LEGACY STRUCTURED",
          messages_json: [{ role: "user", content: "LEGACY STRUCTURED" }],
          message_count: 1,
        }
      }, null);
      assert("legacy structured prompt kind", legacyStructuredPayload.kind === "legacy_prompt");
      assert("legacy structured prompt preserves step", legacyStructuredPayload.traces[0].stepType === "legacy_step");
      assert("legacy structured prompt preserves content", legacyStructuredPayload.traces[0].compiledPrompt === "LEGACY STRUCTURED");

      const legacyStructuredArrayPayload = api.extractPromptPayload({
        prompt_trace: [
          { step_type: "legacy_1", compiled_prompt: "L1", messages_json: [], message_count: 0 },
          { step_type: "legacy_2", compiled_prompt: "L2", messages_json: [], message_count: 0 }
        ]
      }, null);
      assert("legacy structured array count", legacyStructuredArrayPayload.traces.length === 2);
      assert("legacy structured array order", legacyStructuredArrayPayload.traces[1].stepType === "legacy_2");

      const unavailablePromptPayload = api.extractPromptPayload({}, { error: "audit down", steps: [] });
      assert("audit error prompt unavailable", unavailablePromptPayload.kind === "unavailable");
      assert("audit error prompt has zero traces", unavailablePromptPayload.traces.length === 0);

      const normalizedTraceList = api.normalizePromptTraceList({
        prompt_traces: [
          { step_type: "writer", compiled_prompt: "", messages_json: [{ role: "system", content: "fallback" }], message_count: 1 },
          { step_type: "ignored", compiled_prompt: "", messages_json: null, message_count: 0 },
          { step_type: "ignored-whitespace", compiled_prompt: "   \n  ", messages_json: null, message_count: 0 }
        ]
      });
      assert("normalize trace list keeps partial trace", normalizedTraceList.length === 1);
      assert("normalize trace list exposes messages json", Array.isArray(normalizedTraceList[0].messagesJson));

      const invalidJson = api.parseResponseBody("{bad", "application/json");
      assert("parsing json invalide", invalidJson.error.code === "INVALID_JSON_RESPONSE");

      output.className = "pass";
      output.textContent = logs.join("\n");
    }

    try {
      run();
    } catch (err) {
      output.className = "fail";
      output.textContent = `${logs.join("\n")}\nFAIL ${err.message}`;
      throw err;
    }
  </script>
</body>
</html>
