openapi: 3.1.0
info:
  title: astral_calculator_api
  version: 1.0.0
  description: API HTTP technique du moteur de calcul astral. Les appels inter-services utilisent les routes canoniques `/v1/internal/calculations/*`; les routes `/v1/calculations/*` restent exposees comme aliases legacy compatibles.
servers:
  - url: http://astral_calculator_api:8080
    description: Reseau Docker astral_net
  - url: http://localhost:8080
    description: Hote local
paths:
  /health/live:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: Process HTTP vivant
  /health/ready:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: DB, referentiel et ephemerides OK
        "503":
          description: Service non pret (error_response_v1)
  /v1/contracts:
    get:
      summary: Decouverte des contrats
      responses:
        "200":
          description: Liste des schemas et lien OpenAPI
  /v1/schemas/{version}:
    get:
      summary: JSON Schema publie
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Schema JSON
  /v1/reference/status:
    get:
      summary: Etat du referentiel astrologique
      responses:
        "200":
          description: Checks referentiel
  /v1/internal/calculations/validate:
    post:
      summary: Valider un payload contre un schema (route interne canonique)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Payload valide
        "422":
          description: error_response_v1 — `VALIDATION_FAILED` (payload ou schema invalide)
  /v1/internal/calculations/natal:
    post:
      summary: Calcul natal (route interne canonique)
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./astro_engine_request_v1.schema.json"
      responses:
        "200":
          description: astro_engine_response_v1
          content:
            application/json:
              schema:
                $ref: "./astro_engine_response_v1.schema.json"
        "422":
          description: error_response_v1 — `VALIDATION_FAILED` ou `CALCULATION_FAILED`
  /v1/internal/calculations/natal/simplified:
    post:
      summary: Calcul natal simplifie (route interne canonique)
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./astro_simplified_natal_request_v1.schema.json"
      responses:
        "200":
          description: astro_simplified_natal_response_v1
          content:
            application/json:
              schema:
                $ref: "./astro_simplified_natal_response_v1.schema.json"
        "422":
          description: error_response_v1 — entree invalide (`VALIDATION_FAILED`)
  /v1/internal/calculations/horoscope/daily-natal:
    post:
      summary: Calcul horoscope quotidien depuis theme natal (route interne canonique)
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./horoscope_calculation_request.schema.json"
      responses:
        "200":
          description: horoscope_calculation_response
          content:
            application/json:
              schema:
                $ref: "./horoscope_calculation_response.schema.json"
        "422":
          description: error_response_v1 — `VALIDATION_FAILED` ou theme natal introuvable
  /v1/internal/calculations/horoscope/period/natal:
    post:
      summary: Calcul horoscope periode depuis theme natal (route interne canonique)
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./horoscope_period_calculation_request.schema.json"
      responses:
        "200":
          description: horoscope_period_calculation_response
          content:
            application/json:
              schema:
                $ref: "./horoscope_period_calculation_response.schema.json"
        "422":
          description: error_response_v1 — `VALIDATION_FAILED` ou theme natal introuvable
  /v1/calculations/validate:
    post:
      summary: Valider un payload contre un schema (alias legacy compatible)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Payload valide
        "422":
          description: error_response_v1 — `VALIDATION_FAILED` (payload ou schema invalide)
  /v1/calculations/natal:
    post:
      summary: Calcul natal (alias legacy compatible)
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./astro_engine_request_v1.schema.json"
      responses:
        "200":
          description: astro_engine_response_v1
          content:
            application/json:
              schema:
                $ref: "./astro_engine_response_v1.schema.json"
        "422":
          description: error_response_v1 — `VALIDATION_FAILED` ou `CALCULATION_FAILED`
  /v1/calculations/natal/simplified:
    post:
      summary: Calcul natal simplifie (alias legacy compatible)
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./astro_simplified_natal_request_v1.schema.json"
      responses:
        "200":
          description: astro_simplified_natal_response_v1
          content:
            application/json:
              schema:
                $ref: "./astro_simplified_natal_response_v1.schema.json"
        "422":
          description: |
            error_response_v1 — entree invalide (`VALIDATION_FAILED`) : contrat obsolete, format date,
            date calendaire impossible, coordonnees hors bornes, heure sans timezone, JSON invalide.
            Le calculateur n'utilise pas HTTP 400 pour ces erreurs metier.
  /v1/calculations/horoscope/daily-natal:
    post:
      summary: Calcul horoscope quotidien depuis theme natal (alias legacy compatible)
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./horoscope_calculation_request.schema.json"
      responses:
        "200":
          description: horoscope_calculation_response
          content:
            application/json:
              schema:
                $ref: "./horoscope_calculation_response.schema.json"
        "422":
          description: error_response_v1 — `VALIDATION_FAILED` ou theme natal introuvable
  /v1/calculations/horoscope/period/natal:
    post:
      summary: Calcul horoscope periode depuis theme natal (alias legacy compatible)
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./horoscope_period_calculation_request.schema.json"
      responses:
        "200":
          description: horoscope_period_calculation_response
          content:
            application/json:
              schema:
                $ref: "./horoscope_period_calculation_response.schema.json"
        "422":
          description: error_response_v1 — `VALIDATION_FAILED` ou theme natal introuvable
  /openapi.yaml:
    get:
      summary: Cette specification OpenAPI
      responses:
        "200":
          description: OpenAPI YAML
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
