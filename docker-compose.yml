services:
  postgres:
    image: postgres:16-alpine
    container_name: astral_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-astral}
      POSTGRES_USER: ${POSTGRES_USER:-astral}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astral_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astral} -d ${POSTGRES_DB:-astral}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
