openapi: 3.1.0
info:
  title: astral_llm_api
  version: 1.0.0
  description: Gateway LLM pour lectures astrologiques.
servers:
  - url: http://astral_llm_api:8081
    description: Reseau Docker astral_net
  - url: http://localhost:8081
    description: Hote local
paths:
  /health/live:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: Process HTTP vivant
  /health/ready:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: DB, profils, modeles et prompts OK
        "503":
          description: Service non pret (error_response_v1)
  /v1/contracts:
    get:
      summary: Decouverte des contrats
      responses:
        "200":
          description: Liste des schemas et lien OpenAPI
  /v1/schemas/{schema_version}:
    get:
      summary: JSON Schema publie
      parameters:
        - name: schema_version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Schema JSON
  /v1/readings/validate:
    post:
      summary: Valider une reponse contre un schema
      responses:
        "200":
          description: Valide
  /v1/providers:
    get:
      summary: Capacites modeles et circuit breakers
      responses:
        "200":
          description: Catalogue providers
  /v1/runs/{run_id}:
    get:
      summary: Audit d un run
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Enregistrement audit
  /v1/services:
    get:
      summary: Catalogue services d integration (active + beta)
      parameters:
        - name: include
          in: query
          schema:
            type: string
            enum: [planned]
      responses:
        "200":
          description: Liste integration_service_v1
  /v1/services/{service_code}/contract:
    get:
      summary: Contrat detaille d un service
      parameters:
        - name: service_code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: integration_service_contract_v1
        "404":
          description: SERVICE_NOT_FOUND
  /v1/jobs:
    post:
      summary: Soumettre un job async d integration
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-Tenant-Id
          in: header
          schema:
            type: string
            default: default
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./integration_job_request_v1.schema.json"
      responses:
        "202":
          description: JOB_ACCEPTED — status queued
          content:
            application/json:
              schema:
                $ref: "./integration_job_response_v1.schema.json"
        "200":
          description: Replay idempotent completed avec result
          content:
            application/json:
              schema:
                $ref: "./integration_job_status_v1.schema.json"
        "409":
          description: IDEMPOTENCY_CONFLICT
        "422":
          description: PAYLOAD_VALIDATION_FAILED
  /v1/jobs/{run_id}:
    get:
      summary: Statut d un job d integration
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Tenant-Id
          in: header
          schema:
            type: string
      responses:
        "200":
          description: integration_job_status_v1
        "404":
          description: JOB_NOT_FOUND
  /openapi.yaml:
    get:
      summary: Cette specification OpenAPI
      responses:
        "200":
          description: OpenAPI YAML
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
