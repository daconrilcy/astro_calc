openapi: 3.1.0
info:
  title: astral_llm_api
  version: 1.0.0
  description: Gateway LLM pour lectures astrologiques.
servers:
  - url: http://astral_llm_api:8081
    description: Reseau Docker astral_net
  - url: http://localhost:8081
    description: Hote local
paths:
  /health/live:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: Process HTTP vivant
  /health/ready:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: DB, profils, modeles et prompts OK
        "503":
          description: Service non pret (error_response_v1)
  /v1/contracts:
    get:
      summary: Decouverte des contrats
      responses:
        "200":
          description: Liste des schemas et lien OpenAPI
  /v1/schemas/{schema_version}:
    get:
      summary: JSON Schema publie
      parameters:
        - name: schema_version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Schema JSON
  /v1/readings/generate:
    post:
      summary: Generer une lecture
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./generate_reading_request_v1.schema.json"
      responses:
        "200":
          description: generate_reading_response_v1
        "400":
          description: |
            error_response_v1 — entree invalide avant generation (`INVALID_INPUT`, `POLICY_VIOLATION`, …).
            Pas de corps `generate_reading_response_v1`.
        "422":
          description: |
            generate_reading_response_v1 avec `status: safety_rejected` (garde post-generation)
            ou error_response_v1 pour echecs metier apres acceptation de la requete.
  /v1/readings/natal/simplified:
    post:
      summary: Lecture natal simplifiee (calcul + generation)
      description: |
        Orchestre POST calculateur /v1/calculations/natal/simplified puis generation
        avec profil natal_simplified. Requiert ASTRAL_CALCULATOR_HOST/PORT sur le gateway LLM.
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../calculator/astro_simplified_natal_request_v1.schema.json"
                - type: object
                  required: []
                  properties:
                    user_language:
                      type: string
                      default: fr
                    audience_level:
                      type: string
                      enum: [beginner, intermediate, advanced]
                      default: beginner
      responses:
        "200":
          description: |
            Enveloppe orchestrée : `calculation`, `reading` (`GenerateReadingResponse`),
            `run_id`, `reading_completeness` (V1 runtime : toujours `partial` ; `simplified` réservé, non émis).
        "400":
          description: |
            error_response_v1 — validation gateway ou rejet calculateur **avant** generation
            (`INVALID_INPUT`). Sans enveloppe `{ calculation, reading }`.
        "422":
          description: |
            Enveloppe orchestrée avec `reading.status: safety_rejected` (garde simplified /
            SafetyGuard post-generation). Le corps contient toujours `calculation` + `reading`.
        "503":
          description: CALCULATOR_UNAVAILABLE si client calculateur non configure
  /v1/readings/validate:
    post:
      summary: Valider une reponse contre un schema
      responses:
        "200":
          description: Valide
  /v1/providers:
    get:
      summary: Capacites modeles et circuit breakers
      responses:
        "200":
          description: Catalogue providers
  /v1/runs/{run_id}:
    get:
      summary: Audit d un run
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Enregistrement audit
  /openapi.yaml:
    get:
      summary: Cette specification OpenAPI
      responses:
        "200":
          description: OpenAPI YAML
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
