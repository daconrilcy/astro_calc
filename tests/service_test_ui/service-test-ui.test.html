<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Tests service-test-ui</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; }
    .pass { color: #147d4d; }
    .fail { color: #b42318; }
  </style>
</head>
<body>
  <h1>Tests service-test-ui</h1>
  <pre id="output"></pre>
  <script src="./service-test-ui.js"></script>
  <script>
    const output = document.getElementById("output");
    const logs = [];

    function assert(name, condition) {
      if (!condition) throw new Error(name);
      logs.push(`PASS ${name}`);
    }

    function run() {
      const api = window.AstralServiceTestUi;
      const input = {
        birthDate: "1990-06-15",
        birthTime: "14:30:00",
        timezone: "Europe/Paris",
        targetDate: "2026-06-09",
        language: "fr",
        audience: "general",
        location: {
          latitude: 48.8566,
          longitude: 2.3522,
          label: "Paris, France",
          countryCode: "fr",
        },
      };

      const natal = api.buildGatewayNatalRequest(input);
      assert("payload natal context", natal.context.target_language_code === "fr");
      assert("payload natal birth location", natal.birth.location.latitude === 48.8566);
      assert("payload natal audience general", natal.context.audience_level === "general");

      const calculatorNatal = api.buildCalculatorNatalPayload(input);
      assert("payload calculator natal contract", calculatorNatal.request_contract_version === "astro_engine_request_v1");
      assert("payload calculator natal projection", calculatorNatal.projection.level === "compact");
      assert("payload calculator natal heure", calculatorNatal.birth.time === "14:30:00");

      const daily = api.buildGatewayHoroscopeDailyRequest(input, 123, { tier: "premium" });
      assert("payload horoscope daily id", daily.chart_calculation_id === "123");
      assert("payload horoscope daily date", daily.date === "2026-06-09");
      assert("payload horoscope daily premium location", daily.location.label === "Paris, France");
      assert("payload horoscope daily premium detail", daily.detail_level === "premium_rich");

      const freeDaily = api.buildGatewayHoroscopeDailyRequest(input, 123, { tier: "free" });
      assert("payload horoscope daily free no location", !Object.prototype.hasOwnProperty.call(freeDaily, "location"));

      const period = api.buildGatewayHoroscopePeriodRequest(input, 456);
      assert("payload horoscope period anchor", period.anchor_date === "2026-06-09");
      assert("payload horoscope period langue", period.target_language === "fr");
      assert("payload horoscope period code", period.target_language_code === "fr");
      assert("payload horoscope period audience", period.audience_level === "general");

      assert("code langue supporte", api.supportedTargetLanguageCode("de") === "de");
      assert("code langue non supporte", api.supportedTargetLanguageCode("it") === null);

      assert("audience gateway beginner", api.normalizeGatewayAudience("beginner") === "beginner");
      assert("audience gateway general", api.normalizeGatewayAudience("general") === "general");
      assert("audience horoscope expert", api.normalizeHoroscopeAudience("expert") === "expert");
      assert("audience horoscope default", api.normalizeHoroscopeAudience("intermediate") === "general");

      assert("detection horoscope", api.isHoroscopeService({ kind: "horoscope_period" }));
      assert("detection non horoscope", !api.isHoroscopeService({ kind: "natal_full" }));

      assert("validation service bloque sans location", api.serviceCanRun({ kind: "natal_simplified" }, { ...input, location: null }) === "Resoudre le lieu avant execution.");
      assert("validation service full requiert heure", api.serviceCanRun({ kind: "natal_full" }, { ...input, birthTime: "" }) === "Heure de naissance requise pour ce service.");

      const natalSections = api.normalizeGatewayReadingSections({
        metadata: { product_code: "natal_full_basic", variant: "full", tier: "basic" },
        quality: { calculator_contract_version: "astro_engine_response_v1", llm_contract_version: "generate_reading_response_v1" },
        reading: {
          reading: {
            summary: { title: "Synthese", short_text: "Texte court." },
            chapters: [{ title: "Chapitre", body: "Paragraphe 1.\n\nParagraphe 2." }],
          }
        }
      });
      assert("rendu gateway natal sections", natalSections.length >= 4);

      const horoscopeSections = api.normalizeGatewayReadingSections({
        metadata: { product_code: "horoscope_free_daily", variant: "daily", tier: "free" },
        reading: {
          summary: { title: "Jour", text: "Resume." },
          slots: [{ title: "Matin", text: "Texte.", advice: "Conseil." }],
        }
      });
      assert("rendu gateway horoscope sections", horoscopeSections.length >= 3);

      const invalidJson = api.parseResponseBody("{bad", "application/json");
      assert("parsing json invalide", invalidJson.error.code === "INVALID_JSON_RESPONSE");

      const htmlError = api.parseResponseBody("<html>nope</html>", "text/html");
      assert("parsing erreur non json", htmlError.error.code === "NON_JSON_RESPONSE");

      assert("id client disponible", typeof api.newClientId() === "string" && api.newClientId().length > 8);

      output.className = "pass";
      output.textContent = logs.join("\n");
    }

    try {
      run();
    } catch (err) {
      output.className = "fail";
      output.textContent = `${logs.join("\n")}\nFAIL ${err.message}`;
      throw err;
    }
  </script>
</body>
</html>
