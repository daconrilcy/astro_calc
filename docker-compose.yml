name: astral

# Stack locale : postgres + astral_calculator_api + astral_llm_api
# Reseau partage astral_net, configuration partagee via .env a la racine.
# Demarrage : docker compose up -d --build

services:
  postgres:
    image: postgres:18-alpine
    container_name: astral_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - astral_net
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  astral_calculator_api:
    build:
      context: .
      dockerfile: docker/astral_calculator_api/Dockerfile
    container_name: astral_calculator_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ASTRAL_CALCULATOR_HOST: 0.0.0.0
      ASTRAL_CALCULATOR_ALLOW_PUBLIC_BIND: "true"
      ASTRAL_EPHEMERIS_PATH: /app/ephe/se-2026a
    networks:
      - astral_net
    ports:
      - "8080:8080"
    volumes:
      - ./ephe:/app/ephe:ro
    depends_on:
      postgres:
        condition: service_healthy

  astral_llm_api:
    build:
      context: .
      dockerfile: docker/astral_llm_api/Dockerfile
    container_name: astral_llm_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ASTRAL_LLM_HOST: 0.0.0.0
      ASTRAL_LLM_ALLOW_PUBLIC_BIND: "true"
      ASTRAL_LLM_ENABLE_PERSISTENCE: "true"
      ASTRAL_LLM_PROMPTS_DIR: /app/prompts
      ASTRAL_LLM_CONTRACTS_DIR: /app/contracts/llm
      # Reseau Docker : le gateway appelle le calculateur par nom de service (pas 127.0.0.1 du .env hote).
      ASTRAL_CALCULATOR_HOST: astral_calculator_api
      ASTRAL_CALCULATOR_PORT: "8080"
      ASTRAL_LLM_DEFAULT_PROVIDER: ${ASTRAL_LLM_DEFAULT_PROVIDER:-openai}
      ASTRAL_LLM_DEFAULT_MODEL: ${ASTRAL_LLM_DEFAULT_MODEL:-${OPENAI_DEFAULT_MODEL:-gpt-5-mini}}
      ASTRAL_LLM_ENABLE_FAKE: "false"
      ASTRAL_LLM_DB_AUTO_MIGRATE: "true"
    networks:
      - astral_net
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  astral_llm_worker:
    build:
      context: .
      dockerfile: docker/astral_llm_worker/Dockerfile
    container_name: astral_llm_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ASTRAL_LLM_ENABLE_PERSISTENCE: "true"
      ASTRAL_LLM_DB_AUTO_MIGRATE: "true"
      ASTRAL_LLM_PROMPTS_DIR: /app/prompts
      ASTRAL_LLM_CONTRACTS_DIR: /app/contracts/llm
      ASTRAL_CALCULATOR_HOST: astral_calculator_api
      ASTRAL_CALCULATOR_PORT: "8080"
      ASTRAL_LLM_DEFAULT_PROVIDER: ${ASTRAL_LLM_DEFAULT_PROVIDER:-openai}
      ASTRAL_LLM_DEFAULT_MODEL: ${ASTRAL_LLM_DEFAULT_MODEL:-${OPENAI_DEFAULT_MODEL:-gpt-5-mini}}
      ASTRAL_LLM_ENABLE_FAKE: "false"
      ASTRAL_LLM_MERCURE_URL: http://mercure/.well-known/mercure
      ASTRAL_LLM_MERCURE_PUBLISHER_JWT: ${MERCURE_PUBLISHER_JWT_KEY:-!ChangeThisMercureHubJWTSecretKey!}
    networks:
      - astral_net
    depends_on:
      postgres:
        condition: service_healthy
      astral_calculator_api:
        condition: service_started
      astral_llm_api:
        condition: service_started

  mercure:
    image: dunglas/mercure:v0.16
    container_name: astral_mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_PUBLISHER_JWT_KEY:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_SUBSCRIBER_JWT_KEY:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins *
        anonymous
    networks:
      - astral_net
    ports:
      - "3000:80"

networks:
  astral_net:
    name: astral_net

volumes:
  postgres_data:
